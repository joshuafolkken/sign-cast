# CodeRabbit 設定ファイル（高速化版）
# https://docs.coderabbit.ai/reference/configuration
# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: 'ja'
early_access: false

reviews:
  profile: 'assertive'
  request_changes_workflow: false
  high_level_summary: false
  poem: false
  review_status: true
  review_details: false
  in_progress_fortune: false
  sequence_diagrams: false
  estimate_code_review_effort: false
  related_issues: false
  related_prs: false
  assess_linked_issues: false
  suggested_labels: false
  suggested_reviewers: false
  changed_files_summary: false
  enable_prompt_for_ai_agents: true
  path_filters:
    - '!node_modules/**'
    - '!dist/**'
    - '!build/**'
    - '!*.lock'
    - '!pnpm-lock.yaml'
    - '!.svelte-kit/**'
  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 3
  tools:
    github-checks:
      timeout_ms: 5000
    phpstan:
      enabled: false
    phpmd:
      enabled: false
    phpcs:
      enabled: false
    golangci-lint:
      enabled: false
    rubocop:
      enabled: false
    ruff:
      enabled: false
    flake8:
      enabled: false
    pylint:
      enabled: false
    hadolint:
      enabled: false
    checkov:
      enabled: false
    tflint:
      enabled: false
    trivy:
      enabled: false
    circleci:
      enabled: false
    clippy:
      enabled: false
    sqlfluff:
      enabled: false
    pmd:
      enabled: false
    clang:
      enabled: false
    cppcheck:
      enabled: false
    buf:
      enabled: false
    regal:
      enabled: false
    checkmake:
      enabled: false
    brakeman:
      enabled: false
    swiftlint:
      enabled: false
    detekt:
      enabled: false
    shopifyThemeCheck:
      enabled: false
    luacheck:
      enabled: false
    oxc:
      enabled: false
    semgrep:
      enabled: false
    opengrep:
      enabled: false
    languagetool:
      enabled: false
    biome:
      enabled: false
  path_instructions:
    - path: 'src/**'
      instructions: |
        SvelteKit プロジェクトです。Svelte 5 の runes ($state, $derived など) と TypeScript の型安全性を重視してください。
        ESLint と Prettier のルールに従っているか確認してください。
    - path: '**/*.spec.*'
      instructions: |
        Vitest のユニットテストです。テストカバレッジとエッジケースの検証を確認してください。
    - path: '**/*.test.*'
      instructions: |
        Playwright の E2E テストです。ユーザーフローとアクセシビリティを確認してください。
    - path: 'scripts/**'
      instructions: |
        ビルド・デプロイ用スクリプトです。エラーハンドリングとクロスプラットフォーム互換性を確認してください。

knowledge_base:
  web_search:
    enabled: false
  code_guidelines:
    enabled: true
    filePatterns:
      - 'prompts/coding-standards.md'

chat:
  auto_reply: true
